name: roninx
description: "RoninX - Premium Anime Streaming Client"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.0.0
  supabase_flutter: ^2.9.0
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_windows_video: ^1.0.11
  http: ^1.6.0
  encrypt: ^5.0.3
  html: ^0.15.6
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.5
  flutter_inappwebview:
    git:
      url: https://github.com/roshancodespace/flutter_inappwebview.git
      path: flutter_inappwebview
  url_launcher: ^6.3.0
  flutter_svg: ^2.2.4
  wakelock_plus: ^1.2.8
  window_manager: ^0.5.1
  connectivity_plus: ^6.0.3
  flutter_qjs: any
  cryptography: any
  path_provider: any
  isar: any
  isar_flutter_libs: any
  screen_brightness: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: any
  isar_generator: any

flutter:
  uses-material-design: true

dependency_overrides:
  ffi: ^2.1.2
