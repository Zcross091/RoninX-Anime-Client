name: Run Miner Manually

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run from'
        required: false
        default: 'main'
        type: string

jobs:
  run-miner:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anime-miner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'anime-miner/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Run miner
        env:
          CI: true
          PUPPETEER_HEADLESS: true
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node miner_gogo_or_at_https_dump.js
