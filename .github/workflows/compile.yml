name: Compile Apps

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.35.7

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create env file
        run: |
          cat > keys.json <<EOF
          {
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANILIST_CLIENT_SECRET": "${{ secrets.ANILIST_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "COMMENTUM_API_URL": "${{ secrets.COMMENTUM_API_URL }}",
            "RELEASE_REPO": "Zcross091/RoninX-Anime-Client"
          }
          EOF

      - name: Verify required source files
        shell: bash
        run: |
          missing=0
          for f in \
            "packages/anymex_extension_bridge/lib" \
            "packages/commentum_client/lib"
          do
            if [ ! -e "$f" ]; then
              echo "MISSING: $f"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "::error::Required submodule source files are missing."
            exit 1
          else
            echo "All required source files present."
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APKs
        run: flutter build apk --release --split-per-abi --dart-define-from-file=keys.json

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsecret-1-dev libmpv-dev libasound2-dev webkit2gtk-4.1

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create env file
        run: |
          cat > keys.json <<EOF
          {
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANILIST_CLIENT_SECRET": "${{ secrets.ANILIST_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "COMMENTUM_API_URL": "${{ secrets.COMMENTUM_API_URL }}",
            "RELEASE_REPO": "Zcross091/RoninX-Anime-Client"
          }
          EOF

      - name: Enable Linux desktop config
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux app
        run: flutter build linux --release --dart-define-from-file=keys.json

      - name: Zip Linux bundle
        run: |
          cd build/linux/x64/release
          zip -r linux-bundle.zip bundle

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/linux-bundle.zip

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable Windows desktop config
        run: flutter config --enable-windows-desktop

      - name: Create env file
        shell: bash
        run: |
          cat > keys.json <<EOF
          {
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANILIST_CLIENT_SECRET": "${{ secrets.ANILIST_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "COMMENTUM_API_URL": "${{ secrets.COMMENTUM_API_URL }}",
            "RELEASE_REPO": "Zcross091/RoninX-Anime-Client"
          }
          EOF

      - name: Verify required source files
        shell: bash
        run: |
          missing=0
          for f in \
            "packages/anymex_extension_bridge/lib" \
            "packages/commentum_client/lib"
          do
            if [ ! -e "$f" ]; then
              echo "MISSING: $f"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "::error::Required submodule source files are missing."
            exit 1
          else
            echo "All required source files present."
          fi

      - name: Get dependencies
        shell: bash
        run: flutter pub get

      - name: Build Windows app
        shell: bash
        run: |
          set +e
          flutter build windows --release --dart-define-from-file=keys.json
          status=$?
          if [ $status -ne 0 ]; then
            echo "First Windows build attempt failed (exit $status)."
            echo "Retrying once, in case this is the known media_kit/libmpv download race condition."
            flutter build windows --release --dart-define-from-file=keys.json
            status=$?
          fi
          exit $status

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: build/windows/x64/runner/Release
