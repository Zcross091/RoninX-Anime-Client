name: On-Demand Anime Miner

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'The title of the anime to search and mine'
        required: true
        type: string
  repository_dispatch:
    types: [trigger-miner]

jobs:
  mine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOGO_DOMAINS: ${{ secrets.GOGO_DOMAINS }}
          HIANIME_CLUSTER: ${{ secrets.HIANIME_CLUSTER }}
          CI: true
          PUPPETEER_HEADLESS: true
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node miner_roninx.js "${{ github.event.inputs.title }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            node miner_roninx.js "${{ github.event.client_payload.title }}"
          fi
